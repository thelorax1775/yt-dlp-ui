# Example nginx reverse proxy for yt-dlp Web UI.
# Place in /etc/nginx/sites-available/ytdlp-ui and symlink into sites-enabled.

server {
    listen 80;
    server_name ytdlp.example.com;  # change to your domain or _

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API + SSE.
    # If you let the frontend proxy /api (default), this block is optional.
    # Include it if you want nginx to route /api straight to FastAPI.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Critical for Server-Sent Events (live download progress):
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 24h;
    }
}
